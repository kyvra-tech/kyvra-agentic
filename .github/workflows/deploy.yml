name: Deploy Kyvra Bot

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  secret-scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Run secret scan
        run: |
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit .secrets.baseline --report

  deploy-to-vps:
    name: Deploy to Production VPS
    needs: secret-scan
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          set -e

          echo "📦 Deploying Kyvra bot..."
          cd /var/www/kyvra-agentic

          echo "🔄 Pulling latest code..."
          git fetch origin
          git reset --hard origin/main

          echo "📥 Installing dependencies..."
          venv/bin/pip install -r requirements.txt

          echo "⚙️  Writing .env..."
          {
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"
            echo "REPORT_CHAT_IDS=${{ secrets.REPORT_CHAT_IDS }}"
            echo "REPORT_TIME=08:00"
            echo "ACTIVE_MODULE=tech"
            echo "OLLAMA_BASE_URL=http://localhost:11434"
            echo "OLLAMA_MODEL=gemma3"
            echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}"
            echo "DEEPSEEK_MODEL=deepseek-chat"
            echo "X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}"
            echo "TRENDPOST_WEBHOOK_URL=${{ secrets.TRENDPOST_WEBHOOK_URL }}"
            echo "TRENDPOST_WEBHOOK_SECRET=${{ secrets.TRENDPOST_WEBHOOK_SECRET }}"
            echo "TRENDPOST_API_URL=${{ secrets.TRENDPOST_API_URL }}"
          } > .env

          echo "🔄 Restarting service..."
          sudo systemctl restart kyvra-bot

          echo "✅ Deployment complete!"
          sudo systemctl status kyvra-bot --no-pager
          EOF
