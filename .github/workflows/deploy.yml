name: Deploy Kyvra Bot

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  secret-scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Run secret scan
        run: |
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit .secrets.baseline --report

  deploy-to-vps:
    name: Deploy to Production VPS
    needs: secret-scan
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          set -e

          echo "📦 Deploying Kyvra bot..."
          cd /var/www/kyvra-agentic

          echo "🔄 Pulling latest code..."
          git fetch origin
          git reset --hard origin/main

          echo "📥 Installing dependencies..."
          venv/bin/pip install -r requirements.txt

          echo "⚙️  Writing .env..."
          cat > .env << 'ENVEOF'
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          XAI_API_KEY=${{ secrets.XAI_API_KEY }}
          X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}
          NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}
          PRODUCT_HUNT_API_KEY=${{ secrets.PRODUCT_HUNT_API_KEY }}
          REPORT_CHAT_IDS=${{ secrets.REPORT_CHAT_IDS }}
          REPORT_TIME=08:00
          ACTIVE_MODULE=tech
          GROK_MODEL=grok-3-latest
          OLLAMA_BASE_URL=http://localhost:11434
          OLLAMA_MODEL=gemma3
          ENVEOF

          echo "🔄 Restarting service..."
          sudo systemctl restart kyvra-bot

          echo "✅ Deployment complete!"
          sudo systemctl status kyvra-bot --no-pager
          EOF
