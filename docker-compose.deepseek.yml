# Use this if you prefer DeepSeek API over local Ollama.
# Requires DEEPSEEK_API_KEY in .env and CONTENT_LLM_PROVIDER=deepseek.
#
# Usage:
#   docker compose -f docker-compose.deepseek.yml up -d

services:
  kyvra:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - kyvra_data:/app/data
      - /tmp/kyvra_video:/tmp/kyvra_video
    ports:
      - "8000:8000"

volumes:
  kyvra_data:
